<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Faculty Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            margin: 0; padding: 15px; min-height: 100vh;
        }

        h1 { text-align: center; color: #1a73e8; font-weight: 600; margin-bottom: 30px; }
        
        #teacher-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        /* Professional Card Design */
        .card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(10px); /* Glass effect */
            border-radius: 20px; 
            padding: 25px; 
            text-align: center; 
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-10px); }

        .profile-img { 
            width: 110px; height: 110px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 4px solid #fff; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        h2 { margin: 5px 0; color: #333; font-size: 1.3rem; }
        .designation { color: #1a73e8; font-weight: 600; font-size: 0.9rem; margin-bottom: 15px; display: block; }

        .info-table { width: 100%; text-align: left; border-top: 1px dotted #ccc; padding-top: 10px; }
        .info-table td { padding: 4px 0; font-size: 0.85rem; color: #555; }
        .label { font-weight: 600; width: 45%; color: #444; }

        /* WhatsApp Button Styling */
        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #25D366;
            color: white;
            padding: 10px 20px;
            margin-top: 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
            transition: background 0.3s;
        }
        .whatsapp-btn:hover { background-color: #128C7E; }
        .whatsapp-btn img { width: 18px; margin-right: 8px; }

        /* Responsive adjustments for Mobile */
        @media (max-width: 480px) {
            body { padding: 10px; }
            #teacher-grid { grid-template-columns: 1fr; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>

    <h1>Shikshak Parichay</h1>

    <div id="teacher-grid">
        <p style="text-align: center;">Loading Profiles...</p>
    </div>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_A720gp1ZtIueM0wgGvj3bwygTir6-2UkMm5e7ckE3OXOKIAv1wB3-eODt7hZEHa6X7FtXaQ6NeXi/pub?output=csv';

    function fixDriveUrl(url) {
        if (!url) return "";
        url = url.trim();
        if (url.includes("drive.google.com")) {
            let fileId = "";
            if (url.includes("id=")) {
                fileId = url.split("id=")[1].split("&")[0];
            } else if (url.includes("/d/")) {
                fileId = url.split("/d/")[1].split("/")[0];
            }
            return `https://lh3.googleusercontent.com/d/${fileId}`;
        }
        return url;
    }

    async function fetchTeachers() {
        try {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            let htmlContent = '';

            rows.forEach(row => {
                const cols = row.split(',');

                if (cols.length >= 8 && cols[0].trim() !== "") {
                    let photo = fixDriveUrl(cols[7]);
                    let teacherName = cols[0].trim();
                    
                    // WHATSAPP NUMBER: Maan lijiye humne koi default number rakha hai ya aap Sheet mein column add kar sakte hain
                    // Filhaal humne ek example number rakha hai. Aap ise badal sakte hain.
                    let whatsappNumber = "911234567890"; 

                    htmlContent += `
                        <div class="card">
                            <img src="${photo}" alt="Teacher" class="profile-img" onerror="this.src='https://via.placeholder.com/150'">
                            <h2>${teacherName}</h2>
                            <span class="designation">${cols[3]}</span>
                            
                            <table class="info-table">
                                <tr><td class="label">Pita:</td><td>${cols[1]}</td></tr>
                                <tr><td class="label">Mata:</td><td>${cols[2]}</td></tr>
                                <tr><td class="label">Yogyata:</td><td>${cols[4]}</td></tr>
                                <tr><td class="label">Vishay:</td><td>${cols[5]}</td></tr>
                                <tr><td class="label">Experience:</td><td>${cols[6]}</td></tr>
                            </table>

                            <a href="https://wa.me/${whatsappNumber}?text=Hi%20${encodeURIComponent(teacherName)},%20I%20want%20to%20contact%20you." class="whatsapp-btn" target="_blank">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
                                WhatsApp Karein
                            </a>
                        </div>
                    `;
                }
            });

            document.getElementById('teacher-grid').innerHTML = htmlContent || "No data found.";
        } catch (error) {
            document.getElementById('teacher-grid').innerHTML = "Error loading data.";
        }
    }

    fetchTeachers();
</script>

</body>
</html>
