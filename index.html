<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Profile</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        #search-input { padding: 12px; width: 80%; max-width: 400px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        #teacher-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1100px; margin: 0 auto; }
        .card { background: white; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; border-top: 5px solid #1a73e8; }
        .sn { position: absolute; top: 10px; right: 10px; background: #1a73e8; color: white; width: 25px; height: 25px; border-radius: 50%; font-size: 12px; line-height: 25px; font-weight: bold; }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid #1a73e8; margin-bottom: 10px; background: #eee; }
        h2 { margin: 10px 0 5px; color: #333; }
        .desig { color: #1a73e8; font-weight: bold; margin-bottom: 15px; display: block; }
        .info-table { width: 100%; text-align: left; border-top: 1px solid #eee; }
        .info-table td { padding: 6px 0; font-size: 14px; color: #555; border-bottom: 1px solid #f9f9f9; }
        .label { font-weight: bold; color: #333; width: 45%; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="color: #1a73e8;">Our Teaching Faculty</h1>
        <input type="text" id="search-input" placeholder="Teacher ka naam search karein..." onkeyup="filterData()">
    </div>

    <div id="teacher-grid">Loading...</div>

<script>
    // Link updated to TSV to avoid comma errors
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_A72Ggp1ZTuemOwgGvj3bmygTir6-2UkWnSe7ckE3D8DKIAv1wB3-e0Dt7hZEWaSX7FTxaQGNexXi/pub?output=tsv';
    let allData = [];

    async function fetchData() {
        try {
            const response = await fetch(sheetUrl);
            const text = await response.text();
            const rows = text.split('\n').slice(1);
            
            allData = rows.map(row => row.split('\t')).filter(cols => cols.length >= 8 && cols[0].trim() !== "");
            render(allData);
        } catch (e) {
            document.getElementById('teacher-grid').innerHTML = "Data load nahi ho paya.";
        }
    }

    function render(data) {
        let html = '';
        data.forEach((t, i) => {
            // Fixing Google Drive Image Link
            let photo = t[7].trim();
            if(photo.includes('drive.google.com')){
                let id = photo.split('id=')[1] || photo.split('/d/')[1].split('/')[0];
                photo = `https://lh3.googleusercontent.com/d/${id}`;
            }

            html += `
                <div class="card">
                    <div class="sn">${i+1}</div>
                    <img src="${photo}" class="profile-img" onerror="this.src='https://via.placeholder.com/150?text=No+Photo'">
                    <h2>${t[0]}</h2>
                    <span class="desig">${t[3]}</span>
                    <table class="info-table">
                        <tr><td class="label">Father:</td><td>${t[1]}</td></tr>
                        <tr><td class="label">Mother:</td><td>${t[2]}</td></tr>
                        <tr><td class="label">Qualification:</td><td>${t[4]}</td></tr>
                        <tr><td class="label">Subject:</td><td>${t[5]}</td></tr>
                        <tr><td class="label">Experience:</td><td>${t[6]}</td></tr>
                    </table>
                </div>`;
        });
        document.getElementById('teacher-grid').innerHTML = html;
    }

    function filterData() {
        const val = document.getElementById('search-input').value.toLowerCase();
        const filtered = allData.filter(t => t[0].toLowerCase().includes(val));
        render(filtered);
    }

    fetchData();
</script>
</body>
</html>
