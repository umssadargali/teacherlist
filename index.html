<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sikshak Directory</title>
    <style>
        /* Modern Attractive Gradient Background */
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            margin: 0; 
            padding: 30px 10px; 
            min-height: 100vh;
        }

        h1 { 
            text-align: center; 
            color: #2c3e50; 
            margin-bottom: 25px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Search Box styling */
        .search-container {
            text-align: center;
            margin-bottom: 35px;
        }
        #search-input { 
            padding: 14px 20px; 
            width: 80%; 
            max-width: 450px; 
            border-radius: 30px; 
            border: none;
            outline: none; 
            font-size: 16px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: all 0.3s;
        }
        #search-input:focus {
            box-shadow: 0 6px 20px rgba(26, 115, 232, 0.25);
        }

        /* Container for cards */
        #teacher-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 25px; 
            max-width: 1300px; 
            margin: 0 auto; 
            padding: 0 10px;
        }

        /* Highly Attractive Card Design with border and shadow */
        .card { 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 18px; 
            padding: 25px; 
            text-align: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            border: 2px solid #e0e0e0;
        }
        .card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border-color: #3498db;
        }

        /* Serial Number design */
        .sn-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #3498db;
            color: white;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .profile-img { 
            width: 130px; 
            height: 130px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 5px solid white; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        h2 { 
            margin: 10px 0 3px; 
            color: #2c3e50; 
            font-size: 1.5rem; 
        }
        .designation { 
            color: #3498db; 
            font-weight: 600; 
            margin-bottom: 20px; 
            display: block;
            font-size: 1rem;
        }

        .info-table { 
            width: 100%; 
            text-align: left; 
            border-top: 1px solid #eee; 
            padding-top: 15px; 
            border-collapse: collapse;
        }
        .info-table td { 
            padding: 7px 0; 
            font-size: 0.95rem; 
            color: #555; 
        }
        .label { 
            font-weight: 600; 
            width: 45%; 
            color: #333; 
        }

        .loading, .no-data { 
            grid-column: 1 / -1; 
            text-align: center; 
            font-size: 1.3rem; 
            color: white; 
            margin-top: 50px; 
        }
    </style>
</head>
<body>

    <h1>Humaari Shikshak Faculty</h1>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Shikshak ka naam search karein..." onkeyup="filterTeachers()">
    </div>

    <div id="teacher-grid">
        <p class="loading">Loading teacher profiles...</p>
    </div>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_A720gp1ZtIueM0wgGvj3bwygTir6-2UkMm5e7ckE3OXOKIAv1wB3-eODt7hZEHa6X7FtXaQ6NeXi/pub?output=csv';
    let allTeachers = [];

    async function fetchTeachers() {
        try {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            
            // Fixed parsing for standard CSV
            const rows = data.split('\n').slice(1);
            
            allTeachers = rows.map(row => {
                // Regular expression to handle commas inside quotes
                const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                return cols ? cols.map(c => c.replace(/"/g, '').trim()) : null;
            }).filter(row => row !== null && row.length >= 8 && row[0] !== "");

            displayTeachers(allTeachers);
        } catch (error) {
            document.getElementById('teacher-grid').innerHTML = "<p class='no-data'>Data load karne mein dikkat hui. Link check karein.</p>";
            console.error("Error:", error);
        }
    }

    function displayTeachers(teachers) {
        let htmlContent = '';
        if (teachers.length === 0) {
            htmlContent = "<p class='no-data'>Koi data nahi mila.</p>";
        } else {
            teachers.forEach((teacher, index) => {
                // Serial number is index + 1
                const serialNumber = index + 1;
                htmlContent += `
                    <div class="card">
                        <div class="sn-badge">#${serialNumber}</div>
                        <img src="${teacher[7]}" alt="Photo" class="profile-img" onerror="this.src='https://via.placeholder.com/150?text=No+Photo'">
                        <h2>${teacher[0]}</h2>
                        <span class="designation">${teacher[3]}</span>
                        
                        <table class="info-table">
                            <tr><td class="label">Pita ka Naam:</td><td>${teacher[1]}</td></tr>
                            <tr><td class="label">Mata ka Naam:</td><td>${teacher[2]}</td></tr>
                            <tr><td class="label">Yogyata:</td><td>${teacher[4]}</td></tr>
                            <tr><td class="label">Vishay:</td><td>${teacher[5]}</td></tr>
                            <tr><td class="label">Anubhav:</td><td>${teacher[6]}</td></tr>
                        </table>
                    </div>
                `;
            });
        }
        document.getElementById('teacher-grid').innerHTML = htmlContent;
    }

    function filterTeachers() {
        const term = document.getElementById('search-input').value.toLowerCase().trim();
        const filtered = allTeachers.filter(t => t[0].toLowerCase().includes(term));
        displayTeachers(filtered);
    }

    fetchTeachers();
</script>

</body>
</html>
